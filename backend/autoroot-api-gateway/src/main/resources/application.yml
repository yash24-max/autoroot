server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: autoroot-api-gateway
  profiles:
    active: dev
    
  datasource:
    url: jdbc:postgresql://localhost:5432/autoroot
    username: autoroot
    password: autoroot_dev_password
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_dev_password
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: autoroot-gateway
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.autoroot"
        
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      
logging:
  level:
    com.autoroot: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.jpa: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    
autoroot:
  tenant:
    default-tenant-id: "00000000-0000-0000-0000-000000000001"
  kafka:
    topics:
      logs: "autoroot.logs"
      incidents: "autoroot.incidents"
      alerts: "autoroot.alerts"

---
spring:
  config:
    activate:
      on-profile: dev
      
logging:
  level:
    root: INFO
    com.autoroot: DEBUG
    
---
spring:
  config:
    activate:
      on-profile: test
      
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
      
  kafka:
    producer:
      bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      bootstrap-servers: ${spring.embedded.kafka.brokers}
      
---
spring:
  config:
    activate:
      on-profile: prod
      
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    
logging:
  level:
    root: WARN
    com.autoroot: INFO