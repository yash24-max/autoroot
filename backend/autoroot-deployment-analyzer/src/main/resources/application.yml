server:
  port: 8084

spring:
  application:
    name: autoroot-deployment-analyzer
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:autoroot}
    username: ${POSTGRES_USER:autoroot}
    password: ${POSTGRES_PASSWORD:autoroot123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: autoroot-deployment-analyzer
      properties:
        spring.json.trusted.packages: "com.autoroot.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

autoroot:
  kafka:
    log-topic: autoroot.logs
    deployment-group: autoroot-deployment-analyzer
    incident-topic: autoroot.incidents
